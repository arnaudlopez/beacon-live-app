name: Warm weather cache

on:
  schedule:
    # Every 5 minutes — keeps cache hot so users always get instant responses
    - cron: '*/5 * * * *'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping edge function
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            https://rnjtvepcoxvzlwrulnks.supabase.co/functions/v1/weather-cache)
          echo "Edge function responded: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Unexpected status $STATUS"
          fi
