server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Hardening: Masquer la version de Nginx
    server_tokens off;



    # Hardening: Headers de sécurité HTTP
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://server.arcgisonline.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss://*.supabase.co https://*.supabase.co; worker-src 'self';" always;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Single Page Application routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for WindsUp (bypass datacenter IP blocking)
    location /proxy/windsup/ {
        resolver 8.8.8.8 valid=30s;
        proxy_pass https://www.winds-up.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host www.winds-up.com;
        proxy_set_header Accept-Encoding "";
        proxy_pass_header Set-Cookie;
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Reverse proxy for WindsUp mobile site
    location /proxy/windsup-mobile/ {
        resolver 8.8.8.8 valid=30s;
        proxy_pass https://m.winds-up.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host m.winds-up.com;
        proxy_set_header Accept-Encoding "";
        proxy_pass_header Set-Cookie;
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Cache static assets for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}
