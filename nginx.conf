server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Hardening: Masquer la version de Nginx
    server_tokens off;

    # Proxy sécurisé pour Infoclimat — le token est injecté au build Docker (jamais exposé au navigateur)
    location /api/infoclimat/ {
        resolver 127.0.0.11 valid=30s;
        set $ic_token '__INFOCLIMAT_TOKEN__';
        proxy_pass https://www.infoclimat.fr/opendata/?token=$ic_token&$args;
        proxy_ssl_server_name on;
        proxy_set_header Host www.infoclimat.fr;
        add_header Access-Control-Allow-Origin *;
    }

    # Hardening: Headers de sécurité HTTP
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' wss://*.supabase.co https://*.supabase.co https://*.meteofrance.fr https://*.pioupiou.fr https://candhis.cerema.fr https://server.arcgisonline.com; img-src 'self' data: https://server.arcgisonline.com; connect-src 'self' wss://*.supabase.co https://*.supabase.co;" always;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Single Page Application routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}
