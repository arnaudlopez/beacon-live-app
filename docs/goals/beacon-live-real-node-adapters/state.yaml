    receipt:
      result: done
      summary: "Scout mapping completed for making the Portainer branch deploy-ready with real Node weather adapters while preserving demo mode and Supabase fallback."
      design_concept: "Keep weather-api as the server-side live-data owner. Add a real adapter factory beside demoSources with injectable fetch, clock, and env; choose demo or real mode in server.js through WEATHER_SOURCE_MODE; document exact Portainer env vars. Tests must prove source coverage, credential gating, payload parsing, service wiring, and deployment config without network calls."
      ubiquitous_language:
        real adapter: "Node source adapter that fetches an upstream weather provider server-side and returns the runtime reading shape"
        demo adapter: "deterministic no-secret adapter used for smoke tests and fallback"
        source mode: "WEATHER_SOURCE_MODE choosing demo or real backend sources"
        credential-gated source: "source excluded or made unavailable unless required server env vars exist"
        runtime reading shape: "{ source, observedAt, payload: { live, history } } for wind sources and compatible payload objects for mapped IDs"
        Portainer creds: "environment variables added to the stack, never exposed to browser except Vite public values"
      module_map:
        existing_edge_fetchers: "supabase/functions/weather-cache/index.ts contains Deno fetchMF/fetchPP/fetchCD/fetchES/fetchWindsUp/fetchWU behavior to port"
        demo_sources: "server/realtime/demoSources.js remains no-secret smoke mode"
        target_real_sources: "server/realtime/realSources.js should host Node adapter factory and parser helpers"
        service_entrypoint: "server/realtime/server.js should select source mode and pass env/fetch/clock into factories"
        runtime: "server/realtime/weatherRuntime.js already supports source arrays and persistence"
        deployment: "Dockerfile docker-compose.yml DEPLOY_DOCKER.md .env.example need server env vars"
      interface_contract:
        createRealWeatherSources: "returns runtime sources with stable source ids and pollMs values; accepts { clock, fetchImpl, env, pollMs }"
        source_fetch: "each source.fetch resolves a runtime reading or throws/returns unavailable in a way runtime isolates per-source failures"
        server_mode: "WEATHER_SOURCE_MODE=real uses real adapters; WEATHER_SOURCE_MODE=demo uses demo adapters"
        docs: "Portainer docs list METEOFRANCE_KEY, WINDSUP_USER, WINDSUP_PASS, WEATHER_SOURCE_MODE, WEATHER_POLL_MS, WEATHER_HEARTBEAT_MS"
      test_strategy:
        red1: "realSources tests for source list and credential gating"
        red2: "parser tests with representative fixtures for MeteoFrance, Pioupiou, Wunderground, eSurfmar, CANDHIS, WindsUp"
        red3: "server test proves WEATHER_SOURCE_MODE=real wires real sources without external calls and demo still works"
        red4: "deployment config test proves Portainer env vars are present in compose/docs/env example"
      feedback_policy: "Run targeted adapter/service/deployment tests first, then npm test, targeted eslint for changed files, npm run build, docker compose config, local Node /api/health smoke, git diff --check. Global npm run lint may remain blocked by pre-existing unrelated files; use targeted lint unless scope expands."
      acceptance_contract_updates: "End-state proof must include mocked-fetch adapter tests, service source-mode tests, docs/env var verification, full test/build verification, local smoke, commit and push. No real credentials or external network required in CI/local tests."
      dirty_worktree_risk_map: "Untracked .claude/ and docs/goals/beacon-live-realtime-docker-golden-state/.goalbuddy-board/ are unrelated and must remain untouched/uncommitted. Current branch is codex/beacon-live-docker-realtime-product tracking origin. New board files are goal-scoped."
      impact_assessment:
        db_schema_migrations: none
        data_backfill: none
        env_secrets: "adds server-side METEOFRANCE_KEY and optional WINDSUP_USER/WINDSUP_PASS in Portainer; Wunderground key currently public-compatible but should stay server-side if made configurable"
        auth_permissions: none
        api_contract: "/api/weather /api/events /api/health remain same; payload freshness improves when real mode enabled"
        ui_routes: none
        background_jobs: "existing weather-api scheduler will call real sources in real mode"
        external_services: "MeteoFrance, Pioupiou, eSurfmar, CANDHIS, Wunderground, optional WindsUp; tests mock fetch"
        deploy_rollback: "set WEATHER_SOURCE_MODE=demo or remove VITE_WEATHER_BACKEND_URL to fall back safely; Supabase frontend fallback remains"
        observability: "sourceHealth records per-source ok/error; /api/health exposes source status"
        docs: "DEPLOY_DOCKER.md and .env.example must list Portainer variables and smoke commands"
