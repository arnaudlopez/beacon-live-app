      oracle_coverage: "Covered for this slice: /api/weather snapshot shape, /api/health sourceHealth and sseClients, /api/events text/event-stream, weather:update frame delivery after runtime observes changed fake source data, mapped windData.porticcio payload, <=30s latency metadata, and 404 unknown route behavior. Not covered yet: actual Docker process lifecycle, SQLite persistence, real source adapters, proxy buffering behavior, frontend EventSource hook, and deployment."
      remaining_risks: "SSE heartbeat is not implemented yet. /api/events does not send an initial snapshot frame yet. The server is not wired to a long-running scheduler or Docker entrypoint. Global npm run lint remains known-broken outside this slice due to pre-existing files. Repo is behind origin/master and .claude is unrelated/untracked."
      another_worker_slice_needed: true
