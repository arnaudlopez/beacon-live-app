        slice3: "entrypoint demo backend smoke"
        slice4: "frontend hook backend/SSE/fallback"
        slice5: "Docker/proxy/docs smoke"
      feedback_policy: "Each slice starts red, then green with targeted tests. Run npm test, targeted eslint, build, and diff checks. Global npm run lint may remain blocked by pre-existing out-of-scope issues unless separately fixed."
      dirty_worktree_risk_map: "Untracked .claude is unrelated. Existing docs/server artifacts are prior DevLoop work. Branch is behind origin/master. Do not revert unrelated files."
      impact_assessment:
