      result: done
      decision: approved
      summary: "Approved the acceptance contract for a conservative first red-test slice. The next slice should test the backend collector/SSE contract without migrating frontend behavior, secrets, Supabase code, Docker deployment, or external services."
      architecture_review: "The proposed architecture is coherent for the owner goal: a long-running Docker collector owns source polling and source health, SQLite owns local durability/history, /api/weather provides snapshot recovery, and /api/events provides push updates. SSE is the right first transport because Beacon Live needs server-to-client updates and simple reconnect semantics; WebSocket remains a later option only if bidirectional controls appear. The major risk is overpolling external sources before measuring cadence, so source adapters must support per-source intervals and backoff from the start. The first implementation evidence should focus on deterministic local fakes rather than live external APIs."
      approved_design_concept: "Docker beacon-api collector with in-memory snapshot, SQLite persistence boundary, source-specific polling/backoff, stable hash change detection, REST snapshot endpoint, SSE update endpoint, and React hook migration in later phases."
      approved_ubiquitous_language:
        collector: "server-side polling service"
        snapshot: "full normalized dashboard payload"
        observation: "single normalized source reading"
        source health: "freshness/error/backoff metadata"
        SSE: "server-sent update stream"
        freshness target: "visible dashboard update within <=30s after upstream publication under normal conditions"
      feedback_policy: "Use deterministic fake sources and fake timers for red tests first. Do not use real weather credentials or live external APIs during red/green unit work. After backend contract passes, broaden to integration tests, then later frontend hook tests and local browser checks."
      test_strategy: "T003 should write failing Vitest tests for a backend core module that accepts fake source updates, detects changed payload hashes, updates a snapshot, emits an SSE-style weather:update event, preserves stale data on one-source failure, and models <=30s freshness via scheduler interval configuration without waiting real time."
      module_map: "Relevant current code: src/hooks/useWeatherData.js for current client contract; src/config/sources.js for source ids; supabase/functions/weather-cache/index.ts for parser/source registry candidates; Dashboard/SurfWidget/WindMapWidget/HistoricalChart for expected data shape. New backend should live under server/ or beacon-api/ and remain isolated from frontend migration until later tasks."
      interface_contract: "First red tests target pure backend contracts: source poll result -> normalized snapshot merge; changed hash -> broadcast weather:update; failed source -> sourceHealth failure without erasing last value; /api/weather shape and /api/events event naming can be represented in module-level tests before HTTP server wiring."
