        source_config: "src/config/sources.js defines station ids, source ids, coords, and notification constants; future backend and frontend contracts must stay aligned with these ids."
        current_backend_source_parsers: "supabase/functions/weather-cache/index.ts contains fetchMF, fetchPP, fetchCD, fetchES, fetchWindsUp, fetchWU and SF source registry; these are the main parser-port candidates."
