        server/realtime/realSources.js: "creates CANDHIS source adapters"
        server/realtime/weatherRuntime.js: "routes source payloads into windData/surfData/waterData buckets"
        src/hooks/useWeatherData.js: "normalizes backend snapshots and legacy marine payloads"
        src/config/sources.js: "dashboard source metadata"
        src/components/SurfWidget.jsx: "surf spot selector/map/report UI"
        tests: "source/runtime/hook/config/widget evidence"
      interface_contract:
        backend: "/api/weather exposes surfData.alistro when candhis_alistro succeeds"
        runtime: "candhis_alistro must not leak into windData"
        ui: "Alistro selector is enabled when surfData.alistro is present and shows code 02B05"
      test_strategy:
        source: "assert createRealWeatherSources includes candhis_alistro"
        runtime: "assert CANDHIS Alistro routes to surfData.alistro"
        hook: "assert legacy snapshots normalize candhis_alistro"
        ui: "assert SurfWidget can select Alistro"
        release: "targeted lint, full tests, build, diff check"
      feedback_policy: "Run targeted tests/lint after changes, then full npm test, npm run build, and git diff --check before commit."
      dirty_worktree_risk_map: "Leave unrelated .claude/, existing GoalBuddy board artifacts, test_windsup.js, and unrelated useNotifications lint issues untouched."
      impact_assessment:
        db_schema_migrations: none
        data_backfill: none
        env_secrets: none
        auth_permissions: none
        api_contract: "additive surfData.alistro only"
        ui_routes: none
        background_jobs: "one additional CANDHIS polling source at existing default cadence"
        external_services: "uses existing public CANDHIS endpoint for 02B05"
        deploy_rollback: "git revert commit and redeploy Portainer stack"
        observability: "sourceHealth.candhis_alistro reports status"
        docs: "DevLoop goal notes capture scope and evidence"
