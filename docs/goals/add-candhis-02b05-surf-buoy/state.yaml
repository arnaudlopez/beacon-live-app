version: 2
goal:
  slug: "llm-first-interview"
  title: "LLM First Interview"
  status: active
  created_at: "2026-05-25"
  updated_at: "2026-05-25"
  kind: specific
  original_request: "# LLM First Interview\n\n## Intent\n\nAdd a new CANDHIS surf buoy to Beacon Live from:\nhttps://candhis.cerema.fr/_public_/campagne.php?Y2FtcD0wMkIwNQ==\n\nDecoded campaign id: `02B05`.\nCampaign name: `Alistro`.\nDashboard id: `alistro`.\n\nThe owner outcome is that Alistro appears as a selectable surf buoy in the dashboard and receives fresh backend data through the existing realtime pipeline.\n\n- Do not redesign the dashboard.\n- Do not change polling cadence, storage retention, Docker, Portainer, or credential handling.\n- Do not migrate data providers or rework the CANDHIS parser beyond what is required for campaign `02B05`.\n- Do not touch unrelated untracked worktrees or local scratch files.\n\n## Non-Goals\n\n- TODO: Name what this goal must not change.\n\n## Proposed Oracle\n\nBackend includes CANDHIS campaign 02B05, routes it into surfData under a stable dashboard source id, UI exposes the new surf buoy, and tests/build pass.\n\n## Suggested Mode\n\nimplementation\n\n## Acceptance Hints\n\n- A source-backed check confirms CANDHIS campaign id `02B05` resolves to Alistro and the existing parser extracts current surf/water data.\n- Unit tests prove real source creation includes `candhis_alistro`.\n- Runtime tests prove `candhis_alistro` writes to `surfData.alistro` and does not leak into `windData`.\n- Hook tests prove legacy/persisted backend snapshots can normalize `candhis_alistro` into `surfData`.\n- UI tests prove `SurfWidget` renders an enabled Alistro selector and shows code `02B05` after selection.\n- Release checks include targeted lint for changed files, full test suite, production build, and git diff whitespace check.\n\n## Risks And Open Questions\n\n- TODO: List ambiguity, missing credentials, operational risks, or decisions needed before implementation.\n\n## Constraints\n\n- Use the existing CANDHIS adapter and realtime backend architecture.\n- Keep the change small and compatible with Portainer redeploy from GitHub.\n- Do not require new credentials.\n- Do not add new runtime dependencies.\n\n## Ready Mode Command\n\n```bash\nnpm run ready -- --from ./docs/goals/add-candhis-02b05-surf-buoy/brief.md --mode implementation --oracle \"Backend includes CANDHIS campaign 02B05, routes it into surfData under a stable dashboard source id, UI exposes the new surf buoy, and tests/build pass.\" --out docs/goals/llm-first-interview\n```\n\n## Source Notes\n\nCompiled from: /Users/arnaud/Documents/beacon-live-app/docs/goals/add-candhis-02b05-surf-buoy/notes.md\n\n> # LLM First Interview\n> \n> ## Intent\n> \n> Add a new CANDHIS surf buoy to Beacon Live from:\n> https://candhis.cerema.fr/_public_/campagne.php?Y2FtcD0wMkIwNQ==\n> \n> Decoded campaign id: `02B05`.\n> Campaign name: `Alistro`.\n> Dashboard id: `alistro`.\n> \n> The owner outcome is that Alistro appears as a selectable surf buoy in the dashboard and receives fresh backend data through the existing realtime pipeline.\n> \n> ## Non-Goals\n> \n> - Do not redesign the dashboard.\n> - Do not change polling cadence, storage retention, Docker, Portainer, or credential handling.\n> - Do not migrate data providers or rework the CANDHIS parser beyond what is required for campaign `02B05`.\n> - Do not touch unrelated untracked worktrees or local scratch files.\n> \n> ## Proposed Oracle\n> \n> Backend includes CANDHIS campaign `02B05`, routes it into `surfData.alistro` under a stable dashboard source id, UI exposes the new surf buoy, and tests/build pass.\n> \n> ## Acceptance\n> \n> - A source-backed check confirms CANDHIS campaign id `02B05` resolves to Alistro and the existing parser extracts current surf/water data.\n> - Unit tests prove real source creation includes `candhis_alistro`.\n> - Runtime tests prove `candhis_alistro` writes to `surfData.alistro` and does not leak into `windData`.\n> - Hook tests prove legacy/persisted backend snapshots can normalize `candhis_alistro` into `surfData`.\n> - UI tests prove `SurfWidget` renders an enabled Alistro selector and shows code `02B05` after selection.\n> - Release checks include targeted lint for changed files, full test suite, production build, and git diff whitespace check.\n> \n> ## Constraints\n> \n> - Use the existing CANDHIS adapter and realtime backend architecture.\n> - Keep the change small and compatible with Portainer redeploy from GitHub.\n> - Do not require new credentials.\n> - Do not add new runtime dependencies."
  interpreted_outcome: "Run the prepared LLM-first workflow for LLM First Interview."
  input_shape: specific
  audience: "Product owner and target users"
  authority: requested
  proof_type:
    - test
    - artifact
    - review
  completion_proof: "Final audit maps red tests, green verification, implementation receipts, and shipping proof back to the oracle."
  goal_oracle: "Backend includes CANDHIS campaign 02B05, routes it into surfData under a stable dashboard source id, UI exposes the new surf buoy, and tests/build pass."
  oracle:
    signal: "Backend includes CANDHIS campaign 02B05, routes it into surfData under a stable dashboard source id, UI exposes the new surf buoy, and tests/build pass."
    final_proof: "T999 states full_outcome_complete: true and cites passing acceptance evidence, verification commands, design review, and T998 shipping evidence."
  likely_misfire: "Starting implementation from a plausible plan before converting the owner outcome into acceptance tests and observable proof."
  constraints:
    - "Acceptance tests or equivalent observable proof must be written before production implementation."
    - "Implementation must stay inside Judge-approved allowed_files."
    - "Unrelated dirty worktree changes must remain untouched."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  allow_read_only_goal_without_shipping: true
  require_quality_checker: true
  require_tdd_worker_flow: true
  require_github_ship_task: true
  require_impact_assessment: true
  goal_pressure_requires_oracle: true

goal_policy:
  mode: implementation
  requires_tdd: true
  requires_impact_assessment: true
  requires_shipping: true
  requires_visual_verification: false
  requires_migration_proof: false
  requires_infra_proof: false
  requires_dependency_review: false
  requires_dirty_worktree_guard: true
  requires_refactor_proof: false
  rationale: "Ready Mode is for app-code or product-behavior work after an LLM-first spec conversation has converged."

workflow_safeguards:
  requires_design_concept: true
  requires_ubiquitous_language: true
  requires_feedback_policy: true
  requires_test_strategy: true
  requires_module_map: true
  requires_interface_contract: true
  requires_architecture_review: true
  requires_design_delta: true
  require_t998_shipping: true
  require_t999_final_audit: true
  protect_unrelated_dirty_worktree: true

agents:
  scout: installed
  worker: installed
  judge: installed

