      result: done
      summary: "Mapped existing CANDHIS surf buoy flow for campaign 02B05 Alistro before release finalization."
      design_concept: "Use the existing CANDHIS HTML adapter and realtime runtime. Add source candhis_alistro, route it to surfData.alistro, expose Alistro in SurfWidget and source config, with no new credentials or provider migration."
