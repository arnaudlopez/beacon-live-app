services:
  beacon-live:
    # --------------------------------------------------------
    # CONFIGURATION BUILD
    # --------------------------------------------------------
    build:
      context: .
      target: frontend
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_WEATHER_BACKEND_URL=${VITE_WEATHER_BACKEND_URL:-/api}
    container_name: beacon-live
    restart: unless-stopped
    depends_on:
      - weather-api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # --------------------------------------------------------
    # RÉSEAU
    # --------------------------------------------------------
    ports:
      - "9888:80"

    # --------------------------------------------------------
    # SÉCURITÉ MAXIMUM (Hardening)
    # --------------------------------------------------------
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - NET_BIND_SERVICE

    # --------------------------------------------------------
    # LIMITES DE RESSOURCES
    # --------------------------------------------------------
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M

  weather-api:
    build:
      context: .
      target: weather-api
    container_name: beacon-live-weather-api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - HOST=0.0.0.0
      - PORT=8787
      - WEATHER_STORE_PATH=/data/weather-state.json
      - WEATHER_SOURCE_MODE=${WEATHER_SOURCE_MODE:-real}
      - WEATHER_POLL_MS=${WEATHER_POLL_MS:-20000}
      - WEATHER_HEARTBEAT_MS=${WEATHER_HEARTBEAT_MS:-15000}
      - WEATHER_MAX_OBSERVATIONS=${WEATHER_MAX_OBSERVATIONS:-500}
      - METEOFRANCE_KEY=${METEOFRANCE_KEY:-}
      - WINDSUP_USER=${WINDSUP_USER:-}
      - WINDSUP_PASS=${WINDSUP_PASS:-}
      - WUNDERGROUND_API_KEY=${WUNDERGROUND_API_KEY:-}
    volumes:
      - weather-data:/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M

volumes:
  weather-data:
