version: "3.8"

services:
  beacon-live:
    # --------------------------------------------------------
    # CONFIGURATION BUILD
    # --------------------------------------------------------
    build:
      context: .
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_INFOCLIMAT_TOKEN=${VITE_INFOCLIMAT_TOKEN}
    container_name: beacon-live
    restart: unless-stopped

    # --------------------------------------------------------
    # RÉSEAU
    # --------------------------------------------------------
    ports:
      - "9888:80"

    # --------------------------------------------------------
    # SÉCURITÉ MAXIMUM (Hardening)
    # --------------------------------------------------------
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - NET_BIND_SERVICE

    # --------------------------------------------------------
    # LIMITES DE RESSOURCES
    # --------------------------------------------------------
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M
